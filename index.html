<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор фото HTML — Нейросеть</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            text-align: center;
        }
        h1 {
            margin-bottom: 0.5rem;
            font-weight: 300;
            color: #2c3e50;
        }
        p {
            margin-top: 0;
            color: #555;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 70%;
            padding: 12px 20px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-left: 10px;
        }
        button:hover {
            background: #2980b9;
        }
        button:active {
            transform: scale(0.98);
        }
        .image-container {
            margin-top: 30px;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            border: 2px dashed #ccc;
        }
        .image-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
        }
        .examples {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .example-btn {
            background: #ecf0f1;
            color: #2c3e50;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .example-btn:hover {
            background: #bdc3c7;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #7f8c8d;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Генератор фото по описанию</h1>
        <p>Нейросеть создаст изображение по вашему тексту. Попробуйте что-то вроде <em>"современный сайт с тёмной темой"</em></p>
        
        <div style="margin: 20px 0;">
            <input type="text" id="prompt" placeholder="Введите описание изображения..." value="красивый лендинг с космической тематикой">
            <button id="generateBtn">Сгенерировать</button>
        </div>
        
        <div class="examples">
            <button class="example-btn">лендинг космос</button>
            <button class="example-btn">интернет-магазин одежды</button>
            <button class="example-btn">блог о путешествиях</button>
            <button class="example-btn">панель администратора</button>
            <button class="example-btn">сайт ресторана</button>
            <button class="example-btn">портфолио фотографа</button>
        </div>
        
        <div class="image-container" id="imageContainer">
            <div class="loading" id="loadingText">✨ Здесь появится сгенерированное изображение</div>
        </div>
    </div>
    
    <footer>
        Работает через бесплатное API <a href="https://pollinations.ai" target="_blank">Pollinations.ai</a> · 
        Модель: Stable Diffusion · <a href="#" id="disclaimerLink">О проекте</a>
    </footer>

    <script>
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const imageContainer = document.getElementById('imageContainer');
        const loadingText = document.getElementById('loadingText');
        
        // Функция загрузки изображения по промпту
        function generateImage(prompt) {
            if (!prompt.trim()) {
                alert('Пожалуйста, введите описание');
                return;
            }
            
            // Очищаем контейнер и показываем загрузку
            imageContainer.innerHTML = '<div class="loading">⏳ Генерируем изображение, подождите...</div>';
            
            // Кодируем промпт для URL
            const encodedPrompt = encodeURIComponent(prompt);
            // Используем API Pollinations (без ключа)
            const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=768&height=512&nologo=true&model=stable-diffusion`;
            
            // Создаём элемент img
            const img = new Image();
            img.onload = function() {
                // Убираем загрузку и показываем картинку
                imageContainer.innerHTML = '';
                imageContainer.appendChild(img);
            };
            img.onerror = function() {
                imageContainer.innerHTML = '<div class="loading" style="color: #e74c3c;">❌ Ошибка загрузки. Попробуйте другой запрос или повторите позже.</div>';
            };
            img.src = imageUrl;
            img.alt = prompt;
        }
        
        // Обработчик кнопки
        generateBtn.addEventListener('click', () => {
            generateImage(promptInput.value);
        });
        
        // Обработчик Enter в поле ввода
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateImage(promptInput.value);
            }
        });
        
        // Обработчики примеров
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const examplePrompt = btn.textContent;
                promptInput.value = examplePrompt;
                generateImage(examplePrompt);
            });
        });
        
        // При загрузке страницы генерируем картинку по умолчанию
        window.addEventListener('load', () => {
            // Можно сразу показать пример, но лучше дать пользователю самому нажать
            // Но для демо сгенерируем сразу
            // generateImage(promptInput.value);
        });
        
        // Простой disclaimer
        document.getElementById('disclaimerLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Это демонстрационный скрипт, использующий открытое API Pollinations.ai. Все изображения генерируются нейросетью Stable Diffusion на удалённых серверах и могут не соответствовать реальным сайтам.');
        });
    </script>
</body>
</html>
