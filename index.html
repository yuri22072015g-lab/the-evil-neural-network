<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Две игры: кирки и примеры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #b0e0ff 0%, #4da6ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            background: rgba(15,15,15,0.85);
            backdrop-filter: blur(6px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid #3f3f3f;
            font-weight: 500;
            transition: 0.2s;
        }
        .tab.active {
            background: #3ea6ff;
            color: black;
            border-color: #3ea6ff;
        }
        .tab.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .top-panel {
            background: rgba(15,15,15,0.85);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            color: white;
            border: 1px solid #3f3f3f;
        }
        .balance {
            font-size: 24px;
            font-weight: bold;
            color: #ffd966;
        }
        .remaining {
            font-size: 20px;
            color: #7cfc00;
        }
        .wave-info {
            font-size: 20px;
            color: #3ea6ff;
        }
        .bet-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bet-area input {
            background: #272727;
            border: 1px solid #3f3f3f;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            width: 120px;
            font-size: 16px;
        }
        button {
            background: #3ea6ff;
            color: black;
            font-weight: bold;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        button:hover {
            background: #6cb8ff;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .message {
            font-size: 18px;
            color: white;
            margin-left: auto;
        }
        .game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }
        /* Игра 1 */
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 60px);
            grid-template-rows: repeat(10, 60px);
            gap: 3px;
            background: #2d2d2d;
            padding: 10px;
            border-radius: 16px;
            border: 2px solid #5a5a5a;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
        }
        .cell {
            background: #5c5c5c;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            text-shadow: 2px 2px 0 #00000080;
            box-shadow: inset 0 -2px 0 #2e2e2e, inset 0 2px 0 #8f8f8f;
            position: relative;
        }
        .cell.block.iron { background: #c0c0c0; }
        .cell.block.diamond { background: #b9f2ff; }
        .cell.block.netherite { background: #4c4c4c; }
        .cell.chest { background: #8B4513; }
        .cell.pickaxe.material-wood { background: #8B5A2B; }
        .cell.pickaxe.material-stone { background: #808080; }
        .cell.pickaxe.material-iron { background: #C0C0C0; }
        .cell.pickaxe.material-diamond { background: #B9F2FF; }
        .cell.pickaxe.material-netherite { background: #4C4C4C; }
        .cell.dynamite { background: #ff4444; }
        .hp-indicator {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 0 2px;
            border-radius: 4px;
        }
        .pickaxe-label, .dynamite-label, .chest-label {
            position: absolute;
            bottom: 2px;
            left: 4px;
            font-size: 11px;
            background: rgba(0,0,0,0.6);
            padding: 0 3px;
            border-radius: 3px;
            text-transform: uppercase;
        }
        .block-label {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 11px;
            background: rgba(0,0,0,0.6);
            padding: 0 3px;
            border-radius: 3px;
        }
        /* Игра 2 */
        .game2-panel {
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            border: 2px solid #3ea6ff;
            max-width: 600px;
            width: 100%;
        }
        .problem {
            font-size: 48px;
            font-weight: bold;
            color: white;
            background: #2d2d2d;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #5a5a5a;
            width: 100%;
            text-align: center;
        }
        .difficulty-badge {
            font-size: 18px;
            padding: 5px 15px;
            border-radius: 30px;
            background: #3ea6ff;
            color: black;
            font-weight: bold;
        }
        .answer-area {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .answer-area input {
            background: #272727;
            border: 1px solid #3f3f3f;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            width: 200px;
            font-size: 24px;
            text-align: center;
        }
        .game2-buttons {
            display: flex;
            gap: 20px;
        }
        .game2-message {
            font-size: 20px;
            color: #ffd966;
            min-height: 40px;
        }
        .bottom-bar {
            margin-top: 20px;
            padding: 12px 24px;
            background: rgba(15,15,15,0.85);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            color: #ccc;
            text-align: center;
            border: 1px solid #3f3f3f;
        }
        @media (max-width: 700px) {
            .grid { grid-template-columns: repeat(10, 45px); grid-template-rows: repeat(10, 45px); }
            .cell { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="tabs" id="tabs">
        <div class="tab active" data-game="game1">⛏️ Кирки и динамит</div>
        <div class="tab" data-game="game2">🧮 Трудные примеры</div>
    </div>

    <div class="top-panel">
        <div class="balance">💰 Баланс: <span id="balanceDisplay">500</span></div>
        <div class="remaining" id="remainingContainer">💎 Осталось ставки: <span id="remainingDisplay">0</span></div>
        <div class="wave-info" id="waveContainer">🌊 Волна: <span id="waveDisplay">0/4</span></div>
        <div class="bet-area" id="betArea">
            <label>Ставка:</label>
            <input type="number" id="betInput" min="1" value="500">
            <button id="startBtn">Начать игру</button>
        </div>
        <div class="message" id="message"></div>
    </div>

    <div class="game-container">
        <!-- Игра 1: кирки -->
        <div id="game1" style="display: flex;">
            <div id="grid" class="grid"></div>
        </div>

        <!-- Игра 2: примеры (скрыта) -->
        <div id="game2" style="display: none; width: 100%; justify-content: center;">
            <div class="game2-panel">
                <div class="difficulty-badge" id="difficultyBadge">Средняя</div>
                <div class="problem" id="problem">2 + 2</div>
                <div class="answer-area">
                    <input type="number" id="answerInput" placeholder="Ответ">
                </div>
                <div class="game2-buttons">
                    <button id="checkBtn">Проверить</button>
                    <button id="newProblemBtn">Новый пример</button>
                </div>
                <div class="game2-message" id="game2Message"></div>
            </div>
        </div>
    </div>

    <div class="bottom-bar" id="infoBar">
        ⚙️ Активация Windows Чтобы активировать Windows, перейдите в раздел "Параметры". 🚀 Навигатор
    </div>

    <script>
        (function() {
            // ---------- Константы ----------
            const COLS = 10;
            const ROWS = 10;
            const MAX_WAVES = 4;                // 4 волны
            const BLOCK_COST = 15;               // стоимость сломанного блока
            const START_BALANCE = 500;

            // Типы блоков
            const BLOCK_TYPES = [
                { name: 'Ж', class: 'iron', hp: 6 },
                { name: 'А', class: 'diamond', hp: 10 },
                { name: 'Н', class: 'netherite', hp: 15 }
            ];

            // Типы кирок
            const MATERIALS = [
                { name: 'Д', damage: 1, class: 'material-wood', weight: 40, maxUses: 1 },
                { name: 'К', damage: 2, class: 'material-stone', weight: 25, maxUses: 1 },
                { name: 'Ж', damage: 3, class: 'material-iron', weight: 15, maxUses: 1 },
                { name: 'А', damage: 4, class: 'material-diamond', weight: 12, maxUses: 2 },
                { name: 'Н', damage: 5, class: 'material-netherite', weight: 8, maxUses: 2 }
            ];

            // Награды за примеры
            const REWARDS = { easy: 5, medium: 10, hard: 20 };

            // ---------- Состояние ----------
            let balance = START_BALANCE;
            let remainingBet = 0;
            let currentWaveId = -1;
            let waveWaiting = false;
            let activeObjects = 0;
            let gameActive = false;
            let chests = [];
            let grid = [];

            let currentProblem = { text: '2 + 2', answer: 4, difficulty: 'easy' };

            // DOM элементы
            const balanceSpan = document.getElementById('balanceDisplay');
            const remainingSpan = document.getElementById('remainingDisplay');
            const remainingContainer = document.getElementById('remainingContainer');
            const waveSpan = document.getElementById('waveDisplay');
            const waveContainer = document.getElementById('waveContainer');
            const betInput = document.getElementById('betInput');
            const startBtn = document.getElementById('startBtn');
            const messageDiv = document.getElementById('message');
            const infoBar = document.getElementById('infoBar');
            const gridDiv = document.getElementById('grid');
            const game1Div = document.getElementById('game1');
            const game2Div = document.getElementById('game2');
            const problemDiv = document.getElementById('problem');
            const difficultyBadge = document.getElementById('difficultyBadge');
            const answerInput = document.getElementById('answerInput');
            const checkBtn = document.getElementById('checkBtn');
            const newProblemBtn = document.getElementById('newProblemBtn');
            const game2Message = document.getElementById('game2Message');
            const tabs = document.querySelectorAll('.tab');
            const betArea = document.getElementById('betArea');

            let currentGame = 'game1';

            // ---------- Загрузка баланса ----------
            function loadBalance() {
                const saved = localStorage.getItem('game_balance');
                if (saved !== null) {
                    balance = parseInt(saved, 10);
                    if (isNaN(balance) || balance < 0) balance = START_BALANCE;
                }
                updateBalance();
            }
            function saveBalance() {
                localStorage.setItem('game_balance', balance);
            }
            function updateBalance() {
                balanceSpan.textContent = balance;
            }

            // ---------- Инициализация сетки игры 1 ----------
            function initGrid() {
                grid = [];
                chests = [];
                for (let y = 0; y < ROWS; y++) {
                    const row = [];
                    for (let x = 0; x < COLS; x++) {
                        if (y >= ROWS - 4) {
                            if (y === ROWS - 1) { // нижний ряд — сундуки
                                row.push({ type: 'chest' });
                                chests.push({ x, y });
                            } else {
                                const type = BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)];
                                row.push({ type: 'block', blockType: type, hp: type.hp });
                            }
                        } else {
                            row.push(null);
                        }
                    }
                    grid.push(row);
                }
            }

            // Отрисовка сетки
            function renderGrid() {
                gridDiv.innerHTML = '';
                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        const content = grid[y][x];
                        if (content) {
                            if (content.type === 'block') {
                                cell.classList.add('block', content.blockType.class);
                                cell.textContent = '🪨';
                                const label = document.createElement('span');
                                label.className = 'block-label';
                                label.textContent = content.blockType.name;
                                cell.appendChild(label);
                                const hp = document.createElement('span');
                                hp.className = 'hp-indicator';
                                hp.textContent = content.hp;
                                cell.appendChild(hp);
                            } else if (content.type === 'chest') {
                                cell.classList.add('chest');
                                cell.textContent = '🧰';
                                const label = document.createElement('span');
                                label.className = 'chest-label';
                                label.textContent = 'С';
                                cell.appendChild(label);
                            } else if (content.type === 'pickaxe') {
                                cell.classList.add('pickaxe', content.material.class);
                                cell.textContent = '⛏️';
                                const label = document.createElement('span');
                                label.className = 'pickaxe-label';
                                label.textContent = content.material.name;
                                cell.appendChild(label);
                            } else if (content.type === 'dynamite') {
                                cell.classList.add('dynamite');
                                cell.textContent = '💣';
                                const label = document.createElement('span');
                                label.className = 'dynamite-label';
                                label.textContent = 'ТНТ';
                                cell.appendChild(label);
                            }
                        }
                        gridDiv.appendChild(cell);
                    }
                }
            }

            // Выбор случайного материала кирки с весом
            function getRandomMaterial() {
                const total = MATERIALS.reduce((s, m) => s + m.weight, 0);
                let r = Math.random() * total;
                for (let m of MATERIALS) {
                    if (r < m.weight) return m;
                    r -= m.weight;
                }
                return MATERIALS[0];
            }

            // Спавн новой волны
            function spawnWave() {
                if (!gameActive) return;
                if (currentWaveId >= MAX_WAVES - 1) return;

                const nextId = currentWaveId + 1;
                const rows = [0, 1, 2];
                let spawned = 0;

                for (let y of rows) {
                    for (let x = 0; x < COLS; x++) {
                        if (grid[y][x] !== null) continue;
                        const r = Math.random();
                        if (r < 0.75) { // кирка
                            const mat = getRandomMaterial();
                            grid[y][x] = { type: 'pickaxe', material: mat, uses: mat.maxUses, waveId: nextId };
                            spawned++;
                        } else if (r < 0.85) { // динамит
                            grid[y][x] = { type: 'dynamite', waveId: nextId };
                            spawned++;
                        }
                        // иначе пусто
                    }
                }

                if (spawned > 0) {
                    activeObjects = spawned;
                    currentWaveId = nextId;
                    waveWaiting = true;
                    waveSpan.textContent = (currentWaveId + 1) + '/' + MAX_WAVES;
                    renderGrid();

                    setTimeout(() => {
                        waveWaiting = false;
                    }, 3000);
                } else {
                    setTimeout(spawnWave, 500);
                }
            }

            // Взрыв динамита (возвращает true, если игра должна продолжиться)
            function explodeAndCheckLoss(newGrid, y, x) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const ny = y + dy;
                        const nx = x + dx;
                        if (ny < 0 || ny >= ROWS || nx < 0 || nx >= COLS) continue;
                        const target = newGrid[ny][nx];
                        if (target && target.type === 'block') {
                            newGrid[ny][nx] = null;
                            remainingBet -= BLOCK_COST;
                            remainingSpan.textContent = remainingBet;
                            if (remainingBet <= 0) {
                                messageDiv.textContent = '💔 Ставка проиграна!';
                                gameActive = false;
                                startBtn.disabled = false;
                                betInput.disabled = false;
                                tabs.forEach(t => t.classList.remove('disabled'));
                                saveBalance();
                                updateBalance();
                                return false; // игра окончена
                            }
                        } else if (target && target.type === 'chest') {
                            newGrid[ny][nx] = null; // сундук уничтожен, списания нет
                        }
                    }
                }
                return true; // продолжаем
            }

            // Открытие сундуков
            function openChests() {
                let mult = 1;
                let count = 0;
                for (let c of chests) {
                    let clear = true;
                    for (let yy = c.y - 1; yy >= 0; yy--) {
                        if (grid[yy][c.x] !== null) { clear = false; break; }
                    }
                    if (clear) {
                        count++;
                        const r = Math.random();
                        if (r < 0.5) mult *= 1;
                        else if (r < 0.9) mult *= 2;
                        else mult *= 3;
                    }
                }
                if (count > 0) {
                    const win = remainingBet * mult;
                    balance += win;
                    messageDiv.textContent = `🎉 Выигрыш: ${win} (x${mult})`;
                } else {
                    messageDiv.textContent = '😢 Сундуки не открылись.';
                }
                saveBalance();
                updateBalance();
                gameActive = false;
                startBtn.disabled = false;
                betInput.disabled = false;
                infoBar.textContent = 'Игра окончена.';
                tabs.forEach(t => t.classList.remove('disabled'));
            }

            // Проверка окончания игры
            function checkGameOver() {
                if (!gameActive) return;
                if (currentWaveId >= MAX_WAVES - 1 && activeObjects === 0) {
                    openChests();
                }
            }

            // Игровой тик (движение)
            function gameTick() {
                if (!gameActive || currentWaveId === -1 || waveWaiting) return;

                const newGrid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
                // Копируем блоки и сундуки
                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        const c = grid[y][x];
                        if (c && (c.type === 'block' || c.type === 'chest')) {
                            newGrid[y][x] = { ...c };
                        }
                    }
                }

                // Обрабатываем объекты сверху вниз
                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        const obj = grid[y][x];
                        if (!obj) continue;
                        if (obj.type !== 'pickaxe' && obj.type !== 'dynamite') continue;
                        if (obj.waveId !== currentWaveId) continue;

                        if (y === ROWS - 1) {
                            activeObjects--;
                            continue;
                        }

                        const below = newGrid[y + 1][x];

                        if (below === null) {
                            // Пусто — перемещаем
                            if (obj.type === 'pickaxe') {
                                newGrid[y + 1][x] = { type: 'pickaxe', material: obj.material, uses: obj.uses, waveId: obj.waveId };
                            } else {
                                newGrid[y + 1][x] = { type: 'dynamite', waveId: obj.waveId };
                            }
                        }
                        else if (below.type === 'block' || below.type === 'chest') {
                            if (obj.type === 'pickaxe') {
                                if (below.type === 'block') {
                                    below.hp -= obj.material.damage;
                                    let uses = obj.uses - 1;
                                    if (uses <= 0) {
                                        activeObjects--;
                                        if (below.hp <= 0) {
                                            newGrid[y + 1][x] = null;
                                            remainingBet -= BLOCK_COST;
                                            remainingSpan.textContent = remainingBet;
                                            if (remainingBet <= 0) {
                                                messageDiv.textContent = '💔 Ставка проиграна!';
                                                gameActive = false;
                                                startBtn.disabled = false;
                                                betInput.disabled = false;
                                                tabs.forEach(t => t.classList.remove('disabled'));
                                                saveBalance();
                                                updateBalance();
                                                return;
                                            }
                                        }
                                    } else {
                                        if (below.hp <= 0) {
                                            newGrid[y + 1][x] = { type: 'pickaxe', material: obj.material, uses, waveId: obj.waveId };
                                            remainingBet -= BLOCK_COST;
                                            remainingSpan.textContent = remainingBet;
                                            if (remainingBet <= 0) {
                                                messageDiv.textContent = '💔 Ставка проиграна!';
                                                gameActive = false;
                                                startBtn.disabled = false;
                                                betInput.disabled = false;
                                                tabs.forEach(t => t.classList.remove('disabled'));
                                                saveBalance();
                                                updateBalance();
                                                return;
                                            }
                                        } else {
                                            if (newGrid[y][x] === null) {
                                                newGrid[y][x] = { type: 'pickaxe', material: obj.material, uses, waveId: obj.waveId };
                                            } else {
                                                activeObjects--;
                                            }
                                        }
                                    }
                                } else { // chest
                                    // кирка не ломает сундук, остаётся на месте
                                    if (newGrid[y][x] === null) {
                                        newGrid[y][x] = { type: 'pickaxe', material: obj.material, uses: obj.uses, waveId: obj.waveId };
                                    } else {
                                        activeObjects--;
                                    }
                                }
                            } else { // dynamite
                                const continueGame = explodeAndCheckLoss(newGrid, y, x);
                                if (!continueGame) return; // игра окончена
                                activeObjects--;
                            }
                        }
                        else if (below.type === 'pickaxe' || below.type === 'dynamite') {
                            // под другим объектом — стоим
                            if (newGrid[y][x] === null) {
                                if (obj.type === 'pickaxe') {
                                    newGrid[y][x] = { type: 'pickaxe', material: obj.material, uses: obj.uses, waveId: obj.waveId };
                                } else {
                                    newGrid[y][x] = { type: 'dynamite', waveId: obj.waveId };
                                }
                            } else {
                                activeObjects--;
                            }
                        }
                    }
                }

                grid = newGrid;
                renderGrid();

                // Проверяем, не пора ли следующую волну
                if (activeObjects === 0 && currentWaveId < MAX_WAVES - 1) {
                    setTimeout(spawnWave, 3000);
                }

                checkGameOver();
            }

            // Запуск игры 1
            function startGame() {
                const bet = parseInt(betInput.value, 10);
                if (isNaN(bet) || bet <= 0) { alert('Введите корректную ставку'); return; }
                if (bet > balance) { alert('Недостаточно средств'); return; }

                balance -= bet;
                saveBalance();
                updateBalance();

                initGrid();
                remainingBet = bet;
                currentWaveId = -1;
                activeObjects = 0;
                waveWaiting = false;
                gameActive = true;
                startBtn.disabled = true;
                betInput.disabled = true;
                messageDiv.textContent = '';
                infoBar.textContent = 'Идёт игра...';
                remainingSpan.textContent = remainingBet;
                waveSpan.textContent = '0/4';

                // Блокируем вкладки
                tabs.forEach(t => t.classList.add('disabled'));

                renderGrid();

                setTimeout(() => {
                    if (gameActive) spawnWave();
                }, 1000);
            }

            startBtn.addEventListener('click', startGame);

            // ---------- Игра 2 ----------
            function generateProblem() {
                const r = Math.random();
                let diff;
                if (r < 0.33) diff = 'easy';
                else if (r < 0.66) diff = 'medium';
                else diff = 'hard';

                let text, answer;
                if (diff === 'easy') {
                    const a = Math.floor(Math.random() * 10) + 1;
                    const b = Math.floor(Math.random() * 10) + 1;
                    if (Math.random() < 0.5) {
                        text = `${a} + ${b}`;
                        answer = a + b;
                    } else {
                        if (a >= b) { text = `${a} - ${b}`; answer = a - b; }
                        else { text = `${b} - ${a}`; answer = b - a; }
                    }
                } else if (diff === 'medium') {
                    const a = Math.floor(Math.random() * 9) + 2;
                    const b = Math.floor(Math.random() * 9) + 2;
                    if (Math.random() < 0.5) {
                        text = `${a} × ${b}`;
                        answer = a * b;
                    } else {
                        const prod = a * b;
                        text = `${prod} ÷ ${a}`;
                        answer = b;
                    }
                } else {
                    const a = Math.floor(Math.random() * 10) + 2;
                    const b = Math.floor(Math.random() * 10) + 2;
                    const c = Math.floor(Math.random() * 5) + 2;
                    const v = Math.floor(Math.random() * 3);
                    if (v === 0) {
                        text = `(${a} + ${b}) × ${c}`;
                        answer = (a + b) * c;
                    } else if (v === 1) {
                        text = `${a} × ${b} + ${c}`;
                        answer = a * b + c;
                    } else {
                        text = `${a} × ${b} - ${c}`;
                        answer = a * b - c;
                    }
                }
                return { text, answer, difficulty: diff };
            }

            function updateProblem() {
                currentProblem = generateProblem();
                problemDiv.textContent = currentProblem.text;
                const diffText = { easy: 'Легкая (+5)', medium: 'Средняя (+10)', hard: 'Сложная (+20)' };
                difficultyBadge.textContent = diffText[currentProblem.difficulty];
                answerInput.value = '';
                game2Message.textContent = '';
            }

            checkBtn.addEventListener('click', () => {
                const ans = parseInt(answerInput.value, 10);
                if (isNaN(ans)) {
                    game2Message.textContent = 'Введите число!';
                    return;
                }
                if (ans === currentProblem.answer) {
                    const reward = REWARDS[currentProblem.difficulty];
                    balance += reward;
                    saveBalance();
                    updateBalance();
                    game2Message.textContent = `✅ Правильно! +${reward}`;
                    updateProblem();
                } else {
                    game2Message.textContent = '❌ Неправильно.';
                }
            });

            newProblemBtn.addEventListener('click', updateProblem);

            // ---------- Переключение вкладок ----------
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    if (tab.classList.contains('disabled')) return;
                    const game = tab.dataset.game;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    if (game === 'game1') {
                        game1Div.style.display = 'flex';
                        game2Div.style.display = 'none';
                        remainingContainer.style.display = 'inline-block';
                        waveContainer.style.display = 'inline-block';
                        betArea.style.display = 'flex';
                        currentGame = 'game1';
                    } else {
                        game1Div.style.display = 'none';
                        game2Div.style.display = 'flex';
                        remainingContainer.style.display = 'none';
                        waveContainer.style.display = 'none';
                        betArea.style.display = 'none';
                        currentGame = 'game2';
                        if (gameActive) {
                            // Прерываем игру 1
                            gameActive = false;
                            startBtn.disabled = false;
                            betInput.disabled = false;
                            tabs.forEach(t => t.classList.remove('disabled'));
                            messageDiv.textContent = 'Игра прервана.';
                            initGrid();
                            renderGrid();
                        }
                        updateProblem();
                    }
                });
            });

            // Инициализация
            loadBalance();
            initGrid();
            renderGrid();
            updateProblem();
            setInterval(gameTick, 600);
        })();
    </script>
</body>
</html>
