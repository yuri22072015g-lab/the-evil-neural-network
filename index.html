<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетплейс вещей (локальная версия)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        header { background: #333; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        #auth button { margin-left: 10px; padding: 5px 10px; }
        main { padding: 20px; }
        #filters { background: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        #itemsList { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item-card { background: white; border-radius: 5px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item-card h3 { margin-top: 0; }
        .item-card .type { font-size: 0.9em; color: #666; }
        .item-card .price { font-weight: bold; color: #2c3e50; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 300px; border-radius: 5px; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
        #addItemSection { background: white; padding: 20px; border-radius: 5px; margin-top: 20px; }
        #addItemForm input, #addItemForm textarea, #addItemForm select { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        #addItemForm button { background: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Торговая площадка</h1>
        <div id="auth"></div>
    </header>
    <main>
        <section id="filters">
            <h2>Фильтры</h2>
            <select id="typeFilter">
                <option value="all">Все товары</option>
                <option value="virtual">Виртуальные</option>
                <option value="real">Реальные</option>
            </select>
            <button id="applyFilter">Применить</button>
        </section>
        <section id="items">
            <h2>Объявления</h2>
            <div id="itemsList"></div>
        </section>
        <section id="addItemSection" style="display: none;">
            <h2>Добавить объявление</h2>
            <form id="addItemForm">
                <input type="text" id="itemName" placeholder="Название товара" required>
                <textarea id="itemDescription" placeholder="Описание" required></textarea>
                <input type="number" id="itemPrice" placeholder="Цена" required>
                <select id="itemType" required>
                    <option value="virtual">Виртуальный</option>
                    <option value="real">Реальный</option>
                </select>
                <button type="submit">Опубликовать</button>
            </form>
        </section>
    </main>

    <!-- Модальные окна -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Вход</h2>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
        </div>
    </div>
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Регистрация</h2>
            <form id="registerForm">
                <input type="text" id="regUsername" placeholder="Имя пользователя" required>
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // --- Инициализация хранилищ ---
            // Пользователи: объект { username: password } (пароль хранится в открытом виде для простоты демо)
            if (!localStorage.getItem('users')) {
                localStorage.setItem('users', JSON.stringify({}));
            }
            // Товары: массив объектов { id, name, description, price, type, seller }
            if (!localStorage.getItem('items')) {
                // Начальные тестовые товары
                const demoItems = [
                    { id: '1', name: 'Курс по JavaScript', description: 'Видеокурс для начинающих', price: 1500, type: 'virtual', seller: 'admin' },
                    { id: '2', name: 'Игровая мышь', description: 'Беспроводная, RGB', price: 3200, type: 'real', seller: 'admin' }
                ];
                localStorage.setItem('items', JSON.stringify(demoItems));
            }

            // Текущий пользователь (храним в sessionStorage, чтобы сохранялось при перезагрузке)
            let currentUser = sessionStorage.getItem('currentUser') ? JSON.parse(sessionStorage.getItem('currentUser')) : null;

            // --- Элементы DOM ---
            const authDiv = document.getElementById('auth');
            const itemsList = document.getElementById('itemsList');
            const addItemSection = document.getElementById('addItemSection');
            const loginModal = document.getElementById('loginModal');
            const registerModal = document.getElementById('registerModal');
            const closeButtons = document.querySelectorAll('.close');
            const typeFilter = document.getElementById('typeFilter');
            const applyFilterBtn = document.getElementById('applyFilter');

            // --- Вспомогательные функции ---
            function loadUsers() {
                return JSON.parse(localStorage.getItem('users')) || {};
            }
            function saveUsers(users) {
                localStorage.setItem('users', JSON.stringify(users));
            }
            function loadItems() {
                return JSON.parse(localStorage.getItem('items')) || [];
            }
            function saveItems(items) {
                localStorage.setItem('items', JSON.stringify(items));
            }

            // Обновление интерфейса в зависимости от авторизации
            function updateAuthUI() {
                if (currentUser) {
                    authDiv.innerHTML = `<span>Привет, ${currentUser.username}</span>
                                         <button id="logoutBtn">Выйти</button>
                                         <button id="showAddItem">Добавить товар</button>`;
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                    document.getElementById('showAddItem').addEventListener('click', () => {
                        addItemSection.style.display = 'block';
                    });
                } else {
                    authDiv.innerHTML = `<button id="showLogin">Вход</button>
                                         <button id="showRegister">Регистрация</button>`;
                    addItemSection.style.display = 'none';
                }
                // Перезакрепить обработчики модалок
                document.getElementById('showLogin')?.addEventListener('click', () => {
                    loginModal.style.display = 'block';
                });
                document.getElementById('showRegister')?.addEventListener('click', () => {
                    registerModal.style.display = 'block';
                });
            }

            // Загрузка и отображение товаров с учётом фильтра
            function renderItems() {
                const type = typeFilter.value;
                let items = loadItems();
                if (type !== 'all') {
                    items = items.filter(item => item.type === type);
                }
                itemsList.innerHTML = '';
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <h3>${escapeHtml(item.name)}</h3>
                        <p>${escapeHtml(item.description)}</p>
                        <p class="type">${item.type === 'virtual' ? 'Виртуальный' : 'Реальный'}</p>
                        <p class="price">${item.price} руб.</p>
                        <p><small>Продавец: ${escapeHtml(item.seller)}</small></p>
                    `;
                    itemsList.appendChild(card);
                });
            }

            // Простой экранирование для предотвращения XSS
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // --- Операции с пользователями ---
            function register(username, password) {
                const users = loadUsers();
                if (users[username]) {
                    return { success: false, message: 'Имя уже занято' };
                }
                users[username] = password; // В реальном проекте нужно хэшировать, но для демо так
                saveUsers(users);
                return { success: true };
            }

            function login(username, password) {
                const users = loadUsers();
                if (users[username] && users[username] === password) {
                    currentUser = { username };
                    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                    return { success: true };
                }
                return { success: false, message: 'Неверное имя или пароль' };
            }

            function logout() {
                currentUser = null;
                sessionStorage.removeItem('currentUser');
                updateAuthUI();
                renderItems(); // возможно, ничего не меняется, но обновим
            }

            // --- Операции с товарами ---
            function addItem(name, description, price, type) {
                if (!currentUser) return { success: false, message: 'Не авторизован' };
                const items = loadItems();
                const newItem = {
                    id: Date.now() + Math.random().toString(36).substr(2, 9),
                    name,
                    description,
                    price: parseFloat(price),
                    type,
                    seller: currentUser.username
                };
                items.push(newItem);
                saveItems(items);
                return { success: true };
            }

            // --- Обработчики событий ---
            document.addEventListener('DOMContentLoaded', () => {
                updateAuthUI();
                renderItems();
            });

            // Закрытие модалок по крестику
            closeButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    loginModal.style.display = 'none';
                    registerModal.style.display = 'none';
                });
            });
            window.addEventListener('click', (e) => {
                if (e.target == loginModal) loginModal.style.display = 'none';
                if (e.target == registerModal) registerModal.style.display = 'none';
            });

            // Форма регистрации
            document.getElementById('registerForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                if (!username || !password) {
                    alert('Заполните все поля');
                    return;
                }
                const result = register(username, password);
                if (result.success) {
                    registerModal.style.display = 'none';
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regPassword').value = '';
                    alert('Регистрация успешна, теперь войдите');
                } else {
                    alert('Ошибка: ' + result.message);
                }
            });

            // Форма входа
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                if (!username || !password) {
                    alert('Заполните все поля');
                    return;
                }
                const result = login(username, password);
                if (result.success) {
                    loginModal.style.display = 'none';
                    document.getElementById('loginUsername').value = '';
                    document.getElementById('loginPassword').value = '';
                    updateAuthUI();
                    renderItems(); // обновим на всякий случай (могут появиться кнопки)
                } else {
                    alert('Ошибка: ' + result.message);
                }
            });

            // Выход (обработчик назначается динамически, но используем делегирование или перезакрепим в updateAuthUI)
            // Так как кнопка выхода создаётся динамически, повесим обработчик через делегирование на authDiv
            authDiv.addEventListener('click', (e) => {
                if (e.target.id === 'logoutBtn') {
                    logout();
                }
            });

            // Добавление товара
            document.getElementById('addItemForm').addEventListener('submit', (e) => {
                e.preventDefault();
                if (!currentUser) {
                    alert('Необходимо войти');
                    return;
                }
                const name = document.getElementById('itemName').value.trim();
                const description = document.getElementById('itemDescription').value.trim();
                const price = document.getElementById('itemPrice').value.trim();
                const type = document.getElementById('itemType').value;
                if (!name || !description || !price) {
                    alert('Заполните все поля');
                    return;
                }
                const result = addItem(name, description, price, type);
                if (result.success) {
                    document.getElementById('addItemForm').reset();
                    addItemSection.style.display = 'none';
                    renderItems();
                } else {
                    alert('Ошибка: ' + result.message);
                }
            });

            // Применить фильтр
            applyFilterBtn.addEventListener('click', renderItems);
        })();
    </script>
</body>
</html>
